[tox]
minversion = 4.0.0
envlist = py310, py311, py312
isolated_build = true

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
deps =
    -r{toxinidir}/.paa/requirements/requirements_tox.txt
commands =
    pytest --basetemp={envtmpdir} {posargs}
